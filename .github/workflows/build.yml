name: Build Windows EXE

on:
  push:
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Extract version from tag
      id: version
      run: |
        $tag = "${{ github.ref }}".Replace("refs/tags/", "")
        echo "VERSION=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "FILENAME=osd-clock-win64-$tag.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
    
    - name: Build
      run: |
        go build -o ${{ env.FILENAME }} .
      
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: osd-clock-win64-${{ env.VERSION }}
        path: ${{ env.FILENAME }}
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ env.FILENAME }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
