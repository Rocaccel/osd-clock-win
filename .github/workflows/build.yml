name: Build Windows EXE

on:
  push:
    branches: [ main, master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Extract version from tag
      id: version
      run: |
        if ("${{ github.ref }}".StartsWith("refs/tags/")) {
          $tag = "${{ github.ref }}".Replace("refs/tags/", "")
          echo "VERSION=$tag" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "FILENAME=osd-clock-win-$tag.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        } else {
          echo "VERSION=dev" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "FILENAME=osd-clock-win-dev.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        }
    
    - name: Build
      run: |
        go build -o ${{ env.FILENAME }} .
      
    - name: Upload artifact
      uses: actions/upload-artifact@v3
      with:
        name: osd-clock-win-${{ env.VERSION }}
        path: ${{ env.FILENAME }}
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: ${{ env.FILENAME }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
